vehicle:
  name: tunnel_ugv
  drive_type: differential
  max_speed_mps: 0.5
  max_steering_rad: 0.5
  max_angular_radps: 0.5
  angular_sign: 1
  safety_margin_m: 0.5
  rs232:
    port: /dev/ttyUSB0
    baudrate: 115200
    node_addr: 6
    dry_run: true
    live_requires_explicit_flag: true

navigation_bridge:
  bev:
    x_min_m: -2.5
    x_max_m: 2.5
    y_min_m: 0.0
    y_max_m: 8.0
    resolution_m: 0.1
    projection: pseudo_bev
  dwa:
    max_velocity_mps: 0.10
    max_angular_radps: 0.50
    velocity_samples: 3
    angular_samples: 9
    predict_time_s: 2.0
    dt_s: 0.2
